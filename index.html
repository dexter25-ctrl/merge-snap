<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge & Snap - V2 Premium</title>
    <style>
        /* --- BASES & RESET --- */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        /* --- ÉCRAN DE CHARGEMENT --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10vh;
            z-index: 999999;
            transition: opacity 0.8s ease;
        }

        .loading-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .progress-bar {
            width: 80%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
            z-index: 2;
        }

        #load-fill {
            width: 0%;
            height: 100%;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            transition: width 3s linear;
        }

        /* --- HUD : LA BARRE DORÉE --- */
        #game-header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            /* Prend toute la largeur de l'écran */
            height: 65px !important;
            background-image: url('assets/icones/new_barre.png') !important;
            background-size: 100% 100% !important;
            background-repeat: no-repeat !important;
            display: flex !important;
            justify-content: space-around !important;
            align-items: center !important;
            z-index: 10000 !important;
        }

        .header-item {
            display: flex;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .hud-icon {
            width: 24px;
            height: 24px;
            margin-right: 5px;
            object-fit: contain;
        }

        .hud-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        #ui-level {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 13px;
        }

        /* --- ZONE DE JEU --- */
        .app-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            background-image: url('assets/arriere_plan/arriereplan_studio.png');
            background-size: cover;
            background-position: center;
            display: none;
            /* Affiché après loading */
        }

        /* Missions Clients */
        #mission-area {
            position: absolute;
            top: 85px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 100;
        }

        /* Grille de Merge */
        #grid-area {
            position: absolute;
            top: 42%;
            /* Ajustement sur le carré blanc du fond */
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            z-index: 50;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 4px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Objets */
        .item {
            width: 90%;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Brouillard */
        .fog-solid {
            background-image: url('./assets/vieux_papier.png') !important;
            background-size: cover;
            z-index: 10;
        }

        .fog-burned {
            background-image: url('./assets/papier_brule.png') !important;
            background-size: cover;
            z-index: 10;
        }

        /* Footer */
        #game-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }

        .btn-footer {
            background: #f39c12;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 0 #d35400;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <img src="assets/personnages_femme/femme_dem.png" class="loading-bg">
        <div class="progress-bar">
            <div id="load-fill"></div>
        </div>
        <p style="color: white; z-index: 2; margin-top: 10px; font-size: 12px;">CHARGEMENT DU STUDIO...</p>
    </div>

    <header id="game-header">
        <div class="header-item">
            <span id="ui-level">LVL 1</span>
        </div>
        <div class="header-item">
            <img src="assets/icones/icon_eclair.png" class="hud-icon">
            <div class="hud-column">
                <span id="ui-energy">100</span>
                <span id="ui-energy-timer" style="font-size: 10px; color: #f1c40f;">MAX</span>
            </div>
        </div>
        <div class="header-item">
            <img src="assets/icones/icon_piece.png" class="hud-icon">
            <span id="ui-coins">1500</span>
        </div>
        <div class="header-item">
            <img src="assets/icones/icon_diamant.png" class="hud-icon">
            <span id="ui-gems">50</span>
        </div>
    </header>

    <div id="game-ui" class="app-container">

        <section id="mission-area"></section>

        <main id="grid-area">
            <div id="grid"></div>
        </main>

        <footer id="game-footer">
            <button class="btn-footer" onclick="alert('Inventaire bientôt !')">📦 STOCK</button>
            <button class="btn-footer" style="background:#e74c3c; box-shadow: 0 4px 0 #c0392b;" onclick="resetSave()">🔄
                RESET</button>
        </footer>
    </div>

    <script>
        // --- 1. VARIABLES GLOBALES (TES DONNÉES) ---
        let energy = 100;
        let coins = 1500;
        let gems = 50;
        let currentLevel = 1;
        let playerName = "Photographe";
        const cols = 7;
        const gridSize = 63; // 7x9

        // --- 2. CHARGEMENT & INITIALISATION ---
        window.addEventListener('load', () => {
            const fill = document.getElementById('load-fill');
            if (fill) fill.style.width = '100%';

            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'block';
                    initGrid();
                    loadGame(); // On recharge ta progression
                }, 800);
            }, 3000);
        });

        // --- 3. CRÉATION DE LA GRILLE ---
        function initGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;

                // Drag & Drop events
                cell.addEventListener('dragover', e => e.preventDefault());
                cell.addEventListener('drop', handleDrop);

                gridEl.appendChild(cell);
            }
            // Le spawner (ton bouton boite) en haut au milieu
            const spawnerCell = document.querySelector('.cell[data-index="3"]');
            if (spawnerCell) {
                spawnerCell.innerHTML = `<div class="item spawner" onclick="generateItem()" style="cursor:pointer">📦</div>`;
            }
        }

        // --- 4. LOGIQUE DE GÉNÉRATION (TON CODE) ---
        function generateItem() {
            if (energy <= 0) return showMessage("Plus d'énergie !");

            const emptyCells = Array.from(document.querySelectorAll('.cell')).filter(c => !c.hasChildNodes());
            if (emptyCells.length === 0) return showMessage("Grille pleine !");

            energy--;
            updateUI();

            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            const newItem = createItem('A', 1); // Créer Appareil Lvl 1
            randomCell.appendChild(newItem);
            saveGame();
        }

        function createItem(family, level) {
            const item = document.createElement('div');
            item.className = 'item';
            item.draggable = true;
            item.dataset.family = family;
            item.dataset.level = level;

            // Image dynamique selon la famille et le niveau
            item.innerHTML = `<img src="assets/Famille_${family}/${family === 'A' ? 'appareil' : 'objet'}_lvl${level}.png" style="width:80%; height:80%; object-fit:contain; pointer-events:none;">`;

            item.addEventListener('dragstart', handleDragStart);
            return item;
        }

        // --- 5. SYSTÈME DE MERGE (FUSION) ---
        let draggedItem = null;

        function handleDragStart(e) {
            draggedItem = this;
            e.dataTransfer.setData('text/plain', ''); // Requis pour Firefox
        }

        function handleDrop(e) {
            e.preventDefault();
            const targetCell = this;
            const sourceCell = draggedItem.parentElement;

            if (targetCell.hasChildNodes()) {
                const targetItem = targetCell.firstChild;

                // Si même famille et même niveau = FUSION
                if (targetItem.dataset.family === draggedItem.dataset.family &&
                    targetItem.dataset.level === draggedItem.dataset.level) {

                    const newLevel = parseInt(targetItem.dataset.level) + 1;
                    targetCell.removeChild(targetItem);
                    targetCell.appendChild(createItem(draggedItem.dataset.family, newLevel));
                    sourceCell.removeChild(draggedItem);
                    showMessage("Fusion réussie !");
                } else {
                    // Sinon on échange les places (si ce n'est pas le spawner)
                    if (!targetItem.classList.contains('spawner')) {
                        sourceCell.appendChild(targetItem);
                        targetCell.appendChild(draggedItem);
                    }
                }
            } else {
                targetCell.appendChild(draggedItem);
            }
            saveGame();
        }

        // --- 6. SAUVEGARDE & UI ---
        function updateUI() {
            document.getElementById('ui-energy').textContent = energy;
            document.getElementById('ui-coins').textContent = coins;
            document.getElementById('ui-gems').textContent = gems;
            document.getElementById('ui-level').textContent = `LVL ${currentLevel}`;
        }

        function showMessage(msg) {
            console.log(msg); // Tu peux remettre ton système de message flottant ici
        }

        function saveGame() {
            const gridData = [];
            document.querySelectorAll('.cell').forEach((cell, i) => {
                if (cell.firstChild && !cell.firstChild.classList.contains('spawner')) {
                    gridData.push({
                        index: i,
                        family: cell.firstChild.dataset.family,
                        level: cell.firstChild.dataset.level
                    });
                }
            });
            localStorage.setItem('mergeGame_save', JSON.stringify({ energy, coins, gems, currentLevel, gridData }));
        }

        function loadGame() {
            const saved = localStorage.getItem('mergeGame_save');
            if (saved) {
                const data = JSON.parse(saved);
                energy = data.energy;
                coins = data.coins;
                gems = data.gems;
                currentLevel = data.currentLevel;
                // Replacer les objets
                data.gridData.forEach(item => {
                    const cell = document.querySelector(`.cell[data-index="${item.index}"]`);
                    if (cell) cell.appendChild(createItem(item.family, item.level));
                });
                updateUI();
            }
        }

        function resetSave() {
            if (confirm("Effacer ta progression ?")) {
                localStorage.clear();
                window.location.reload();
            }
        }
    </script>
</body>

</html>
