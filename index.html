<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge & Snap - V2 Premium</title>
    <style>
        /* --- RESET & BASE --- */
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: #000;
        }

        /* --- HUD : LA BARRE DORÉE (CORRIGÉE) --- */
        #game-header {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 70px !important;
            background-image: url('assets/icones/new_barre.png') !important;
            background-size: 100% 100% !important;
            background-repeat: no-repeat !important;
            display: flex !important;
            justify-content: space-around !important;
            align-items: center !important;
            z-index: 10000 !important;
            padding: 0 10px !important;
            box-sizing: border-box !important;
        }

        .header-item {
            display: flex;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        .hud-icon {
            width: 24px;
            height: 24px;
            margin-right: 5px;
            object-fit: contain;
        }

        .hud-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }

        #ui-level {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 13px;
        }

        /* --- ZONE DE JEU --- */
        .app-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            background-image: url('assets/arriere_plan/arriereplan_studio.png');
            background-size: cover;
            background-position: center;
        }

        #mission-area {
            position: absolute;
            top: 80px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            z-index: 100;
        }

        /* --- GRILLE DE JEU (RECENTRÉE AU SOL) --- */
        #grid-area {
            position: absolute !important;
            top: 62% !important;
            /* Calage sur la zone grise */
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            width: 90% !important;
            max-width: 400px;
            z-index: 50;
        }

        #grid {
            display: grid !important;
            grid-template-columns: repeat(7, 1fr) !important;
            grid-template-rows: repeat(9, 1fr) !important;
            gap: 4px !important;
            width: 100% !important;
        }

        .cell {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .item {
            width: 90%;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            /* Crucial pour le tactile */
        }

        .item img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            pointer-events: none;
        }

        /* --- FOOTER --- */
        #game-footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }

        .btn-footer {
            background: #f39c12;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 4px 0 #d35400;
            cursor: pointer;
        }

        /* --- LOADING --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100dvh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 10vh;
            z-index: 999999;
        }

        #load-fill {
            width: 0%;
            height: 6px;
            background: white;
            box-shadow: 0 0 10px white;
            transition: width 3s linear;
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <img src="assets/personnages_femme/femme_dem.png"
            style="position:absolute; top:0; width:100%; height:100%; object-fit:cover; opacity:0.6;">
        <div
            style="width:80%; background:rgba(255,255,255,0.2); height:6px; border-radius:3px; z-index:2; overflow:hidden;">
            <div id="load-fill"></div>
        </div>
        <p style="color:white; z-index:2; margin-top:10px;">CHARGEMENT DU STUDIO...</p>
    </div>

    <header id="game-header">
        <div class="header-item"><span id="ui-level">LVL 1</span></div>
        <div class="header-item">
            <img src="assets/icones/icon_eclair.png" class="hud-icon">
            <div class="hud-column">
                <span id="ui-energy">100</span>
                <span id="ui-energy-timer" style="font-size:10px; color:#f1c40f;">MAX</span>
            </div>
        </div>
        <div class="header-item">
            <img src="assets/icones/icon_piece.png" class="hud-icon">
            <span id="ui-coins">0</span>
        </div>
        <div class="header-item">
            <img src="assets/icones/icon_diamant.png" class="hud-icon">
            <span id="ui-gems">0</span>
        </div>
    </header>

    <div id="game-ui" class="app-container">
        <section id="mission-area"></section>
        <main id="grid-area">
            <div id="grid"></div>
        </main>
        <footer id="game-footer">
            <button class="btn-footer" onclick="alert('Inventaire bientôt !')">📦 STOCK</button>
            <button class="btn-footer" style="background:#e74c3c; box-shadow:0 4px 0 #c0392b;" onclick="resetSave()">🔄
                RESET</button>
        </footer>
    </div>

    <script>
        // --- DONNÉES DU JEU ---
        let energy = 100;
        let coins = 0;
        let gems = 0;
        let currentLevel = 1;
        const gridSize = 63;
        let draggedItem = null;
        let sourceCell = null;

        // --- CHARGEMENT ---
        window.onload = () => {
            document.getElementById('load-fill').style.width = '100%';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
                initGrid();
                loadGame();
            }, 3200);
        };

        // --- GRILLE & LOGIQUE ---
        function initGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('dragover', e => e.preventDefault());
                cell.addEventListener('drop', handleDrop);
                gridEl.appendChild(cell);
            }
            // Case 3 = Spawner
            const spawnerCell = document.querySelector('.cell[data-index="3"]');
            spawnerCell.innerHTML = `<div class="item" onclick="generateItem()" style="cursor:pointer; font-size:30px;">📦</div>`;
        }

        function generateItem() {
            if (energy <= 0) return alert("Plus d'énergie !");
            const emptyCells = Array.from(document.querySelectorAll('.cell')).filter(c => !c.hasChildNodes());
            if (emptyCells.length === 0) return alert("Grille pleine !");

            energy--;
            const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            randomCell.appendChild(createItem('A', 1));
            updateUI();
            saveGame();
        }

        function createItem(family, level) {
            const item = document.createElement('div');
            item.className = 'item';
            item.draggable = true;
            item.dataset.family = family;
            item.dataset.level = level;
            item.innerHTML = `<img src="assets/Famille_${family}/appareil_lvl${level}.png">`;

            item.addEventListener('dragstart', handleDragStart);
            // Support Tactile
            item.addEventListener('touchstart', handleTouchStart, { passive: false });
            return item;
        }

        // --- DRAG & DROP LOGIC (FUSION) ---
        function handleDragStart(e) {
            draggedItem = this;
            sourceCell = this.parentElement;
        }

        function handleDrop(e) {
            e.preventDefault();
            processMove(this);
        }

        function processMove(targetCell) {
            if (!draggedItem || targetCell === sourceCell) return;

            if (targetCell.hasChildNodes()) {
                const targetItem = targetCell.firstChild;
                if (targetItem.dataset.family === draggedItem.dataset.family &&
                    targetItem.dataset.level === draggedItem.dataset.level &&
                    targetItem.dataset.level < 10) {
                    // FUSION
                    const nextLevel = parseInt(targetItem.dataset.level) + 1;
                    targetCell.innerHTML = '';
                    targetCell.appendChild(createItem(draggedItem.dataset.family, nextLevel));
                    sourceCell.innerHTML = '';
                } else {
                    // ÉCHANGE
                    sourceCell.appendChild(targetItem);
                    targetCell.appendChild(draggedItem);
                }
            } else {
                targetCell.appendChild(draggedItem);
            }
            saveGame();
        }

        // --- TACTILE (FUSION DES 2 CODES) ---
        function handleTouchStart(e) {
            draggedItem = this;
            sourceCell = this.parentElement;
            // On laisse le comportement par défaut ou on ajoute une logique de clone si besoin
        }

        // --- SYSTÈME DE SAUVEGARDE ---
        function updateUI() {
            document.getElementById('ui-energy').textContent = energy;
            document.getElementById('ui-coins').textContent = coins;
            document.getElementById('ui-gems').textContent = gems;
            document.getElementById('ui-level').textContent = `LVL ${currentLevel}`;
        }

        function saveGame() {
            const gridData = [];
            document.querySelectorAll('.cell').forEach((cell, i) => {
                if (cell.firstChild && cell.dataset.index != 3) {
                    gridData.push({ index: i, family: cell.firstChild.dataset.family, level: cell.firstChild.dataset.level });
                }
            });
            localStorage.setItem('merge_save', JSON.stringify({ energy, coins, gems, level: currentLevel, grid: gridData }));
        }

        function loadGame() {
            const saved = localStorage.getItem('merge_save');
            if (saved) {
                const data = JSON.parse(saved);
                energy = data.energy; coins = data.coins; gems = data.gems; currentLevel = data.level;
                data.grid.forEach(d => {
                    const cell = document.querySelector(`.cell[data-index="${d.index}"]`);
                    if (cell) cell.appendChild(createItem(d.family, d.level));
                });
                updateUI();
            }
        }

        function resetSave() {
            if (confirm("Réinitialiser le jeu ?")) {
                localStorage.clear();
                window.location.reload();
            }
        }
    </script>
</body>

</html>
