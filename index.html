<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge & Snap Premium</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        /* HUD DORÉ PARFAIT */
        #game-header {
            /* Positionnement Absolu pour écraser tout le reste */
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            /* Forçage de la largeur */
            width: 100vw !important;
            /* 100% de la largeur de la vitre du téléphone */
            min-width: 100vw !important;
            height: 70px !important;

            /* L'image dorée */
            background-image: url('assets/icones/new_barre.png') !important;
            background-size: 100% 100% !important;
            /* Étire l'image sur TOUTE la zone */
            background-repeat: no-repeat !important;
            background-position: center !important;

            /* Alignement interne */
            display: flex !important;
            justify-content: space-around !important;
            align-items: center !important;

            /* Priorité maximale sur tout l'index */
            z-index: 999999 !important;
            margin: 0 !important;
            padding: 0 10px !important;
            box-sizing: border-box !important;
        }

        .header-item {
            display: flex;
            align-items: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        .hud-icon {
            width: 22px;
            height: 22px;
            margin-right: 5px;
        }

        /* STUDIO & GRILLE */
        .app-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            background: url('assets/arriere_plan/arriereplan_studio.png') center/cover;
        }

        #grid-area {
            position: absolute;
            top: 62%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92%;
            max-width: 400px;
            z-index: 50;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cell {
            aspect-ratio: 1/1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
        }

        /* BROUILLARD */
        .fog-solid::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/vieux_papier.png') center/cover;
            z-index: 10;
            border-radius: 4px;
        }

        .fog-burned::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/papier_brule.png') center/cover;
            z-index: 5;
            border-radius: 4px;
            opacity: 0.8;
        }

        .item {
            width: 90%;
            height: 90%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .item img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            pointer-events: none;
        }

        #game-footer {
            position: absolute;
            bottom: 15px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

    <header id="game-header">
        <div class="header-item"><span id="ui-level">LVL 1</span></div>
        <div class="header-item"><img src="assets/icones/icon_eclair.png" class="hud-icon"><span
                id="ui-energy">100</span></div>
        <div class="header-item"><img src="assets/icones/icon_piece.png" class="hud-icon"><span id="ui-coins">0</span>
        </div>
        <div class="header-item"><img src="assets/icones/icon_diamant.png" class="hud-icon"><span id="ui-gems">0</span>
        </div>
    </header>

    <div class="app-container">
        <main id="grid-area">
            <div id="grid"></div>
        </main>
        <footer id="game-footer">
            <button class="btn" style="background: #f39c12;">📦 STOCK</button>
            <button class="btn" style="background: #e74c3c;" onclick="resetGame()">🔄 RESET</button>
        </footer>
    </div>

    <script>
        let energy = 100, coins = 0, gems = 0, level = 1;
        const gridEl = document.getElementById('grid');

        function initGame() {
            gridEl.innerHTML = '';
            const saved = localStorage.getItem('merge_snap_save');
            const state = saved ? JSON.parse(saved) : null;

            for (let i = 0; i < 63; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;

                // Logique de brouillard par défaut (exemple)
                if (i > 15) cell.classList.add('fog-solid');
                else if (i > 7) cell.classList.add('fog-burned');

                cell.addEventListener('dragover', e => e.preventDefault());
                cell.addEventListener('drop', handleDrop);
                gridEl.appendChild(cell);
            }

            // Spawner en case 3
            const spawner = document.querySelector('.cell[data-index="3"]');
            spawner.classList.remove('fog-solid', 'fog-burned');
            spawner.innerHTML = `<div class="item" onclick="spawn()" style="cursor:pointer">📦</div>`;

            if (state) loadState(state);
            updateUI();
        }

        function spawn() {
            if (energy <= 0) return alert("Énergie vide !");
            const empties = Array.from(document.querySelectorAll('.cell:not(.fog-solid)')).filter(c => !c.hasChildNodes());
            if (!empties.length) return;

            energy--;
            const cell = empties[Math.floor(Math.random() * empties.length)];
            cell.appendChild(createItem('A', 1));
            updateUI();
            save();
        }

        function createItem(fam, lvl) {
            const div = document.createElement('div');
            div.className = 'item'; div.draggable = true;
            div.dataset.fam = fam; div.dataset.lvl = lvl;
            div.innerHTML = `<img src="assets/Famille_${fam}/appareil_lvl${lvl}.png">`;
            div.addEventListener('dragstart', e => { window.dragged = div; });
            return div;
        }

        function handleDrop(e) {
            const cell = this;
            if (cell.classList.contains('fog-solid')) return;
            const dragged = window.dragged;
            const source = dragged.parentElement;

            if (cell.hasChildNodes()) {
                const target = cell.firstChild;
                if (target.dataset.fam === dragged.dataset.fam && target.dataset.lvl === dragged.dataset.lvl) {
                    const nextLvl = parseInt(target.dataset.lvl) + 1;
                    cell.innerHTML = '';
                    cell.appendChild(createItem(dragged.dataset.fam, nextLvl));
                    source.innerHTML = '';
                    checkDiscovery(parseInt(cell.dataset.index));
                }
            } else {
                cell.appendChild(dragged);
            }
            save();
        }

        function checkDiscovery(idx) {
            const neighbors = [idx - 1, idx + 1, idx - 7, idx + 7];
            neighbors.forEach(n => {
                const c = document.querySelector(`.cell[data-index="${n}"]`);
                if (c && c.classList.contains('fog-burned')) c.classList.remove('fog-burned');
                if (c && c.classList.contains('fog-solid')) {
                    c.classList.remove('fog-solid');
                    c.classList.add('fog-burned');
                }
            });
        }

        function updateUI() {
            document.getElementById('ui-energy').innerText = energy;
            document.getElementById('ui-coins').innerText = coins;
            document.getElementById('ui-level').innerText = "LVL " + level;
        }

        function save() { /* Logique de sauvegarde localStorage */ }
        function resetGame() { localStorage.clear(); location.reload(); }

        initGame();
    </script>
</body>

</html>
